# ClusterIssuers for certificate management.
#
# For Cloudflare setup:
# - External TLS: Cloudflare edge → Raspberry Pi nginx (Origin certs)
# - Internal TLS: Traefik → Services (self-signed CA)
#
# The Origin certificates are managed in Cloudflare dashboard and
# stored on the Raspberry Pi, not in Kubernetes.

---
# Self-signed CA for internal cluster TLS
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}

---
# CA Certificate for internal use
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: internal-ca
  secretName: internal-ca-secret
  duration: 87600h  # 10 years
  renewBefore: 8760h  # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
    group: cert-manager.io

---
# ClusterIssuer using the internal CA
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: internal-ca-issuer
spec:
  ca:
    secretName: internal-ca-secret
