# Traefik configuration
# See: https://github.com/traefik/traefik-helm-chart

traefik:
  # Deployment
  deployment:
    replicas: 1

  # Service configuration
  service:
    type: NodePort

  # Ports configuration
  ports:
    # Web (HTTP)
    web:
      port: 8000
      exposedPort: 80
      nodePort: 30080
      expose: true
      protocol: TCP

    # Websecure (HTTPS)
    websecure:
      port: 8443
      exposedPort: 443
      nodePort: 30443
      expose: true
      protocol: TCP
      tls:
        enabled: true

    # Traefik dashboard
    traefik:
      port: 9000
      expose: false

  # IngressRoute for dashboard (disabled by default)
  ingressRoute:
    dashboard:
      enabled: false

  # Providers
  providers:
    # Kubernetes CRD provider
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true

    # Kubernetes Ingress provider
    kubernetesIngress:
      enabled: true
      publishedService:
        enabled: true

  # Logs
  logs:
    general:
      level: INFO
    access:
      enabled: true

  # Additional arguments
  additionalArguments:
    # Enable API and dashboard
    - "--api.dashboard=true"
    - "--api.insecure=true"

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
