# MinIO configuration
# See: https://github.com/minio/minio/tree/master/helm/minio

minio:
  # Single-node standalone mode
  mode: standalone

  # Persistence
  persistence:
    enabled: true
    size: 20Gi
    storageClass: ""

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

  # Root credentials — provided via k8s-platform-secrets repo
  rootUser: ""
  rootPassword: ""

  # Service
  service:
    type: ClusterIP
    port: 9000

  # Console (web UI)
  consoleService:
    type: ClusterIP
    port: 9001

  # Default buckets to create on startup
  buckets:
    - name: macrosee-images
      policy: none
      purge: false

  # Disable distributed mode resources we don't need
  replicas: 1
