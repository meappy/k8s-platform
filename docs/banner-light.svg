<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <style>
      .title { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 36px; font-weight: 700; fill: #1f2937; }
      .subtitle { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; font-size: 18px; font-weight: 400; fill: #6b7280; }
    </style>
  </defs>

  <!-- Kubernetes wheel icon -->
  <g transform="translate(90, 100)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="35" fill="none" stroke="#326CE5" stroke-width="3"/>
    <!-- Centre hub -->
    <circle cx="0" cy="0" r="8" fill="#326CE5"/>
    <!-- Spokes -->
    <line x1="0" y1="-10" x2="0" y2="-32" stroke="#326CE5" stroke-width="3" stroke-linecap="round"/>
    <line x1="9.5" y1="-3" x2="30.4" y2="-9.9" stroke="#326CE5" stroke-width="3" stroke-linecap="round"/>
    <line x1="5.9" y1="8.1" x2="18.8" y2="25.9" stroke="#326CE5" stroke-width="3" stroke-linecap="round"/>
    <line x1="-5.9" y1="8.1" x2="-18.8" y2="25.9" stroke="#326CE5" stroke-width="3" stroke-linecap="round"/>
    <line x1="-9.5" y1="-3" x2="-30.4" y2="-9.9" stroke="#326CE5" stroke-width="3" stroke-linecap="round"/>
    <!-- Nodes at spoke ends -->
    <circle cx="0" cy="-35" r="5" fill="#326CE5"/>
    <circle cx="33.3" cy="-10.8" r="5" fill="#326CE5"/>
    <circle cx="20.6" cy="28.3" r="5" fill="#326CE5"/>
    <circle cx="-20.6" cy="28.3" r="5" fill="#326CE5"/>
    <circle cx="-33.3" cy="-10.8" r="5" fill="#326CE5"/>
  </g>

  <!-- Title -->
  <text x="170" y="95" class="title">k8s-platform</text>
  <!-- Subtitle -->
  <text x="170" y="130" class="subtitle">Kubernetes GitOps platform with Argo CD</text>

  <!-- Accent line -->
  <rect x="170" y="145" width="60" height="3" rx="1.5" fill="#326CE5"/>
</svg>
